<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#111111">
    <title>鯤鯓記憶</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Noto+Serif+TC:wght@400;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css?v=20260521-buttons-full">
</head>
<body>


    <div class="app container-fluid min-vh-100 d-flex flex-column align-items-center justify-content-center p-2 p-md-4 pt-2 pb-4">
        <div class="row w-100 justify-content-center m-0 align-items-stretch" id="radio" style="max-width: 1100px;">
            
            <!-- Turntable Wooden Base / Body -->
            <div class="col-12 col-lg-9 mb-3 mb-lg-0 px-0 px-lg-2 d-flex">
                <div class="tt-body row m-0 w-100 flex-grow-1">
                    
                    <!-- Left: Platter and Tonearm -->
                    <div class="col-12 col-md-7 tt-platter-area p-4 d-flex align-items-center justify-content-center position-relative">
                        <div class="tt-platter-base">
                        <!-- We use reelL as the spinning wrapper -->
                        <div id="reelL" class="record-spinner">
                            <div class="record" id="cassette">
                                <div class="record-grooves"></div>
                                <div class="record-label">
                                    <div class="clabel-content">
                                        <div class="clabel-stripe" id="labelStripe"></div>
                                        <div class="label-text-area">
                                            <div id="labelTitle">──</div>
                                            <div class="label-brand">KMN RECORDS</div>
                                            <div id="labelSide">SIDE A</div>
                                        </div>
                                    </div>
                                    <div class="spindle-hole"></div>
                                </div>
                            </div>
                        </div>
                        <div class="spindle"></div>
                    </div>
                    
                    <!-- Tonearm Assembly -->
                    <div class="tonearm-assembly" id="tonearm">
                        <div class="tonearm-counterweight"></div>
                        <div class="tonearm-base">
                            <div class="tonearm-pivot"></div>
                        </div>
                        <div class="tonearm-wand"></div>
                        <div class="tonearm-headshell">
                            <div class="stylus"></div>
                        </div>
                    </div>

                    <!-- Hidden elements for JS compatibility -->
                    <div id="reelR" class="d-none"></div>
                    <div id="deckEmpty" class="d-none"></div>
                    <div id="deckWindow" class="d-none"></div>
                </div>

                <!-- Right: Controls -->
                <div class="col-12 col-md-5 tt-controls d-flex flex-column justify-content-around p-4 gap-3 position-relative z-2">
                    
                    <div class="tt-brand">
                        <div class="tt-brand-en">KUNSHÉN</div>
                        <div class="tt-brand-zh">鯤鯓記憶</div>
                    </div>

                    <div class="display-box">
                        <div class="display-track" id="dispTrack">── 選擇唱片 ──</div>
                        <div class="display-status" id="dispStatus">◼ NO RECORD</div>
                        <div class="power-led" id="powerLed"></div>
                    </div>

                    <div class="knob-row">
                        <div class="knob-grp">
                            <div class="knob" id="knobVol" data-val="70"><div class="knob-dot"></div></div>
                            <div class="knob-lbl">VOLUME</div>
                        </div>
                        <div class="knob-grp">
                            <div class="knob" id="knobTone" data-val="50"><div class="knob-dot"></div></div>
                            <div class="knob-lbl">PITCH</div>
                        </div>
                    </div>

                    <div class="tt-buttons d-flex justify-content-center gap-2">
                        <button class="btn flex-grow-1" id="btnRew" aria-label="上一首">
                            <span class="btn-ico">⏮</span>
                        </button>
                        <button class="btn btn-play flex-grow-1" id="btnPlay" aria-label="播放">
                            <span class="btn-ico" id="playIco">▶</span>
                        </button>
                        <button class="btn flex-grow-1" id="btnFF" aria-label="下一首">
                            <span class="btn-ico">⏭</span>
                        </button>
                        <button class="btn btn-eject flex-grow-1" id="btnEject" aria-label="退出">
                            <span class="btn-ico">⏏</span>
                        </button>
                    </div>

                    <div class="vu-wrap d-flex align-items-center justify-content-between gap-3 p-2 px-3 rounded">
                        <div class="vu-bars" id="vuBars">
                            <div class="vu-b" data-i="1"></div>
                            <div class="vu-b" data-i="2"></div>
                            <div class="vu-b" data-i="3"></div>
                            <div class="vu-b" data-i="4"></div>
                            <div class="vu-b" data-i="5"></div>
                            <div class="vu-b" data-i="6"></div>
                            <div class="vu-b" data-i="7"></div>
                            <div class="vu-b" data-i="8"></div>
                        </div>
                        <div class="vu-lbl">LEVEL</div>
                    </div>
                </div>

                </div>
            </div>

            <!-- ── RECORD SELECTION ── -->
            <div class="col-12 col-lg-3 px-0 px-lg-2">
                <div class="record-crate h-100 d-flex flex-column p-3" id="tapeBay">
                    <div class="crate-hdr text-center mb-3">── 選擇黑膠唱片 ──</div>
                    <div class="record-shelf d-flex flex-row flex-lg-column gap-3 overflow-auto flex-grow-1" id="tapeShelf"></div>
                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS bundle (optional, not strictly needed for layout but good practice) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
